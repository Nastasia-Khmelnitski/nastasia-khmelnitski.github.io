<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coaching Methods</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap');
  :root {
    --dark:#3A3A3C; --mid:#4A5248; --khaki:#6A726A; --sage:#A8A8A4;
    --cream:#F2F0EB; --white:#F8F7F4; --ink:#1C1C1E;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'DM Sans',sans-serif;background:var(--white);color:var(--ink);}

  nav{background:var(--dark);padding:14px 72px;display:flex;justify-content:flex-start;align-items:center;position:sticky;top:0;z-index:100;border-bottom:1px solid rgba(255,255,255,0.06);}
  .nav-home{font-size:11px;color:var(--sage);letter-spacing:2px;text-transform:uppercase;text-decoration:none;font-weight:600;font-family:'DM Sans',sans-serif;display:flex;align-items:center;gap:8px;}
  .nav-home:hover{color:var(--cream);}
  .nav-count{font-size:11px;color:var(--sage);letter-spacing:1px;font-weight:500;}

  .hero{background:var(--dark);padding:80px 72px 60px;min-height:60vh;display:flex;flex-direction:column;justify-content:flex-end;}
  .hero-label{font-size:10px;letter-spacing:5px;text-transform:uppercase;color:var(--sage);margin-bottom:20px;font-weight:500;}
  .hero h1{font-family:'DM Serif Display',serif;font-size:clamp(40px,6vw,72px);font-weight:400;line-height:1.0;color:var(--cream);margin-bottom:8px;}
  .hero h1 em{font-style:italic;color:var(--sage);}
  .hero-sub{font-size:13px;color:var(--sage);margin-bottom:36px;font-weight:300;}

  .row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:18px;}
  .row-label{font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--khaki);font-weight:600;width:100%;margin-bottom:6px;}

  /* Row 1: search + toggles */
  #search{padding:10px 16px;border:1px solid var(--mid);background:rgba(255,255,255,0.05);color:var(--cream);font-size:12px;font-family:'DM Sans',sans-serif;outline:none;width:220px;}
  #search::placeholder{color:var(--khaki);}
  #search:focus{border-color:var(--sage);}
  .toggle-group{display:flex;}
  .toggle-btn{padding:10px 18px;border:1px solid var(--mid);border-right:none;cursor:pointer;font-size:10px;font-family:'DM Sans',sans-serif;font-weight:600;letter-spacing:2px;text-transform:uppercase;background:transparent;color:var(--khaki);transition:all 0.12s;}
  .toggle-btn:last-child{border-right:1px solid var(--mid);}
  .toggle-btn.active{background:var(--sage);border-color:var(--sage);color:var(--dark);}
  .toggle-btn:hover:not(.active){color:var(--cream);}

  /* Row 2: coaching arcs */
  .arc-btn{padding:10px 20px;border:1px solid rgba(200,196,160,0.4);background:rgba(200,196,160,0.07);color:var(--sage);cursor:pointer;font-size:11px;font-family:'DM Sans',sans-serif;letter-spacing:1.5px;text-transform:uppercase;font-weight:600;transition:all 0.12s;}
  .arc-btn:hover{border-color:var(--sage);background:rgba(200,196,160,0.15);}
  .arc-btn.active{background:var(--sage);border-color:var(--sage);color:var(--dark);}

  /* Row 3: topics */
  .sit-btn{padding:7px 14px;border:1px solid var(--mid);background:transparent;color:var(--khaki);cursor:pointer;font-size:10px;font-family:'DM Sans',sans-serif;letter-spacing:1.5px;text-transform:uppercase;font-weight:600;transition:all 0.12s;}
  .sit-btn:hover{border-color:var(--sage);color:var(--sage);}
  .sit-btn.active{background:var(--sage);border-color:var(--sage);color:var(--dark);}

  /* Row 4: category filters */
  .cat-btn{padding:7px 14px;border:1px solid rgba(168,168,164,0.3);background:transparent;color:var(--sage);cursor:pointer;font-size:10px;font-family:'DM Sans',sans-serif;letter-spacing:1.5px;text-transform:uppercase;font-weight:600;transition:all 0.12s;}
  .cat-btn:hover{border-color:var(--sage);color:var(--cream);}
  .cat-btn.active{background:var(--mid);border-color:var(--mid);color:var(--cream);}

  /* Stats */
  .stats-bar{background:var(--mid);padding:10px 72px;display:flex;gap:24px;align-items:center;font-size:10px;letter-spacing:2px;text-transform:uppercase;font-weight:600;color:var(--khaki);}
  .stat-practiced{color:var(--sage);}
  .divider{width:1px;height:12px;background:var(--khaki);opacity:0.3;}

  /* Main grid */
  .grid-area{padding:40px 72px;}
  .category-section{margin-bottom:52px;}
  .category-header{display:flex;align-items:center;gap:14px;margin-bottom:18px;}
  .cat-dot{width:6px;height:6px;background:var(--khaki);border-radius:50%;flex-shrink:0;}
  .cat-label-text{font-size:10px;letter-spacing:4px;text-transform:uppercase;font-weight:600;color:var(--khaki);white-space:nowrap;}
  .cat-line{flex:1;height:1px;background:var(--cream);}
  .cat-count{font-size:10px;color:var(--sage);letter-spacing:1px;}
  .cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:2px;}
  .card{background:var(--cream);padding:20px 20px 18px;transition:background 0.15s;border-top:2px solid transparent;display:flex;flex-direction:column;}
  .card:hover{background:#E8E6E0;border-top-color:var(--khaki);}
  .card.learning{background:var(--white);}
  .card.learning:hover{background:#EEECEA;border-top-color:var(--sage);}
  .card-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;}
  .card-name{font-family:'DM Serif Display',serif;font-size:15px;color:var(--dark);line-height:1.2;font-weight:400;flex:1;padding-right:8px;}
  .card-badge{font-size:13px;color:var(--sage);flex-shrink:0;}
  .card-note{font-size:11px;color:var(--khaki);margin-bottom:8px;line-height:1.5;font-weight:600;text-transform:uppercase;letter-spacing:0.5px;}
  .card-desc{font-size:12px;color:var(--ink);margin-bottom:14px;line-height:1.6;font-weight:300;opacity:0.75;flex:1;}
  .card-tags{display:flex;flex-wrap:wrap;gap:4px;margin-top:auto;}
  .card-tag{font-size:9px;padding:3px 9px;font-weight:500;background:transparent;color:var(--khaki);border:1px solid var(--sage);letter-spacing:0.5px;}
  .empty{padding:80px 40px;text-align:center;font-size:10px;letter-spacing:4px;text-transform:uppercase;color:var(--sage);font-weight:600;}

  /* Arc and topic arc views */
  .arc-view{background:var(--white);}
  .arc-hero{background:var(--dark);padding:48px 72px 40px;}
  .arc-hero h2{font-family:'DM Serif Display',serif;font-size:clamp(32px,5vw,56px);font-weight:400;color:var(--cream);line-height:1.0;}
  .arc-hero h2 em{font-style:italic;color:var(--sage);}
  .arc-hero p{font-size:12px;color:var(--sage);margin-top:12px;font-weight:300;}
  .arc-content{padding:40px 72px;}
  .arc-phase-block{margin-bottom:44px;}
  .arc-phase-header{display:flex;align-items:center;gap:14px;margin-bottom:16px;}
  .phase-num{font-family:'DM Serif Display',serif;font-size:36px;color:var(--cream);line-height:1;background:var(--mid);padding:4px 14px;flex-shrink:0;}
  .phase-label{font-size:10px;letter-spacing:3px;text-transform:uppercase;font-weight:600;color:var(--khaki);}
  .phase-line{flex:1;height:1px;background:var(--cream);}
  .arc-grid{display:grid;grid-template-columns:1fr;gap:2px;}
  @media(min-width:700px){.arc-grid{grid-template-columns:repeat(auto-fill,minmax(300px,1fr));}}
  .arc-card{background:var(--cream);padding:20px 24px;transition:background 0.15s;display:flex;flex-direction:column;min-height:160px;}
  .arc-card:hover{background:#E8E6E0;}
  .arc-card.learning{background:var(--white);}
  .arc-card.learning:hover{background:#EEECEA;}
  .arc-card-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;gap:12px;}
  .arc-card h3{font-family:'DM Serif Display',serif;font-size:15px;color:var(--dark);line-height:1.3;font-weight:400;flex:1;}
  .arc-when{font-size:12px;color:var(--khaki);font-style:italic;margin-bottom:4px;line-height:1.5;}
  .arc-note{font-size:12px;color:var(--sage);line-height:1.5;font-weight:300;}
  .arc-desc{font-size:11px;color:var(--ink);line-height:1.6;font-weight:300;opacity:0.7;margin-top:8px;}

  footer{background:var(--dark);padding:20px 72px;font-size:10px;color:var(--khaki);letter-spacing:2px;text-transform:uppercase;font-weight:500;border-top:2px solid var(--mid);}
  footer em{color:var(--sage);font-style:normal;}
</style>
</head>
<body>

<nav>
  <a class="nav-home" href="../">◎ Home</a>
</nav>

<div class="hero">
  <div class="hero-label">Methods &amp; Tools Reference</div>
  <h1>My<br><em>Coaching</em><br>Toolkit</h1>
  <div class="hero-sub">All methods. Filterable by topic and situation.</div>

  <!-- Row 1: search + toggles -->
  <div class="row" style="margin-bottom:20px;">
    <input type="text" id="search" placeholder="Search methods..." oninput="render()">
    <div class="toggle-group">
      <button class="toggle-btn active" onclick="setStatus('all',this)">All</button>
      <button class="toggle-btn" onclick="setStatus('practiced',this)">✓ Practiced</button>
      <button class="toggle-btn" onclick="setStatus('learning',this)">◎ Learning</button>
    </div>
  </div>

  <!-- Row 2: coaching arcs -->
  <div class="row">
    <span class="row-label">Coaching Arcs</span>
    <button class="arc-btn" data-arc="career" onclick="setArc('career',this)">Career &amp; Business</button>
    <button class="arc-btn" data-arc="life" onclick="setArc('life',this)">Life &amp; Wellbeing</button>
    <button class="arc-btn" data-arc="conflict" onclick="setArc('conflict',this)">Conflict Facilitation</button>
  </div>

  <!-- Row 3: topics -->
  <div class="row">
    <span class="row-label">Topics</span>
    <div id="sit-filters" style="display:flex;gap:6px;flex-wrap:wrap;"></div>
  </div>

  <!-- Row 4: category filters -->
  <div class="row">
    <span class="row-label">Category</span>
    <button class="cat-btn" data-cat="Process" onclick="setCat('Process',this)">Process</button>
    <button class="cat-btn" data-cat="Framework" onclick="setCat('Framework',this)">Framework</button>
    <button class="cat-btn" data-cat="Tools" onclick="setCat('Tools',this)">Tools</button>
  </div>
</div>

<div class="stats-bar" id="stats"></div>
<div id="main-view"><div class="grid-area" id="grid"></div></div>
<div id="arc-view" class="arc-view" style="display:none"></div>

<footer>
  <em>Nastasia Khmelnitski &mdash; Coach for Creatives, Artists &amp; Business Professionals</em>
</footer>

<script>
const methods = [
  // PROCESS
  {name:"PESO",category:"Process",practiced:true,topics:["Career","Identity","Change","Conflict","Relationships","Decisions","Stuck","Wellbeing","Teams"],note:"Session opening structure",desc:"Problem, Explanation, Solution Attempts, Objectives. Surfaces what the client brings, what they have tried, and what they want from the session."},
  {name:"Systemic Questions",category:"Process",practiced:true,topics:["Career","Identity","Change","Conflict","Relationships","Decisions","Stuck","Wellbeing","Teams"],note:"Circular, scaling, hypothetical questions",desc:"A family of question types that shift perspective, reveal patterns, and open new thinking without the coach giving advice."},
  {name:"Somatic Observation",category:"Process",practiced:true,topics:["Stuck","Wellbeing","Conflict","Identity"],note:"Name what you observe in body and posture",desc:"The coach notices and names what they observe in the client's body. The body often knows before the mind does."},
  {name:"Paraphrasing",category:"Process",practiced:true,topics:["Career","Identity","Change","Conflict","Relationships","Decisions","Stuck","Wellbeing","Teams"],note:"Reflective listening that confirms understanding",desc:"Restating what the client has said in your own words. Helps the client hear themselves differently and often opens new awareness."},
  {name:"Verbalizing Emotions",category:"Process",practiced:true,topics:["Stuck","Wellbeing","Conflict","Relationships","Identity"],note:"Names the emotion the client has not yet named",desc:"The coach names or reflects the emotion they sense in the client. Brings emotional awareness into the conversation and validates the client's inner experience."},
  {name:"Hard Questions",category:"Process",practiced:true,topics:["Stuck","Identity","Change","Conflict","Decisions"],note:"Assumption challengers, fear naming, cost of avoidance",desc:"Question types designed to create productive discomfort: challenging assumptions, naming fears, confronting values, and asking what staying stuck is costing the client."},
  {name:"Summarising",category:"Process",practiced:true,topics:["Career","Identity","Change","Conflict","Relationships","Decisions","Stuck","Wellbeing","Teams"],note:"Condenses themes to help the client hear the shape of their thinking",desc:"Restating the key themes of what the client has shared. Confirms the coach has followed accurately and helps the client see patterns across what they have said."},
  {name:"Reframing",category:"Process",practiced:true,topics:["Stuck","Identity","Change","Conflict","Relationships"],note:"Offers the same situation from a different angle",desc:"Offering the same situation with a different meaning or perspective. Not correcting the client, but opening a new way of seeing that makes different action possible."},
  {name:"Head / Heart / Hand",category:"Process",practiced:true,topics:["Career","Identity","Change","Conflict","Relationships","Decisions","Stuck","Wellbeing","Teams"],note:"Session closing structure across three dimensions",desc:"The session closing structure. Head: what cognitive insight does the client take away. Heart: what do they feel. Hand: what is their concrete next step. Anchors every session before closing."},
  {name:"Meta Perspective (Inner Team)",category:"Process",practiced:true,topics:["Identity","Conflict","Stuck","Decisions"],note:"Stepping outside the inner conflict to observe it",desc:"Within the Inner Team method, the client steps into an observer position and looks at all their inner figures from the outside. Creates distance from the conflict and allows a more integrated view."},

  // FRAMEWORKS
  {name:"GROW",category:"Framework",practiced:true,topics:["Career","Decisions","Change"],note:"Most flexible session framework",desc:"Goal, Reality, Options, Way Forward. Guides a session from where the client is to where they want to go. Works for almost any topic."},
  {name:"OSCAR",category:"Framework",practiced:false,topics:["Career","Change","Decisions"],note:"Adds review loop, outcome-focused",desc:"Outcome, Situation, Choices, Actions, Review. Starts with the desired outcome first before exploring the current situation. Built-in review step for long-term work."},
  {name:"CLEAR",category:"Framework",practiced:false,topics:["Identity","Change","Wellbeing"],note:"Deep emotional and transformational exploration",desc:"Contract, Listen, Explore, Action, Review. Moves through deep listening and exploration of beliefs and emotions. Strong for identity-level change."},
  {name:"GREAT",category:"Framework",practiced:false,topics:["Career","Decisions","Change"],note:"Adds timing as strategic step",desc:"Goal, Reality, Explore, Action, Timing. Like GROW but adds Timing as a dedicated step, ideal when the client's challenge is not just what to do but when and in what order."},
  {name:"Career Framework (Craig & Snook)",category:"Framework",practiced:false,topics:["Career","Identity"],note:"From personal story to leadership purpose",desc:"Guides the client to identify their leadership purpose from their life story, translating key themes into a purpose statement that informs career direction."},
  {name:"Golden Circle (Sinek)",category:"Framework",practiced:false,topics:["Career","Identity","Teams"],note:"Why, How, What — purpose before action",desc:"Simon Sinek's model that distinguishes between what an organisation or person does (What), how they do it (How), and why they do it (Why). Most people communicate outside-in. Inspiring leaders communicate from the Why outward. Used to help clients articulate their purpose and lead from it."},
  {name:"Situational Leadership (Hersey & Blanchard)",category:"Framework",practiced:false,topics:["Teams","Career"],note:"Adapts leadership style to team member's development level",desc:"A leadership model describing four styles (directing, coaching, supporting, delegating) matched to four levels of team member competence and commitment. Used to help leaders diagnose what a team member needs and flex their approach accordingly."},
  {name:"Conflict Facilitation in Coaching",category:"Framework",practiced:false,topics:["Conflict","Relationships","Teams"],note:"Structured coaching approach to interpersonal conflict",desc:"A framework for facilitating conflict between two parties using coaching tools. Helps both parties access their own perspective, hear each other, and find a path forward. Not mediation — a coaching-based process."},

  // METHODS
  {name:"Wheel of Life",category:"Method",practiced:true,topics:["Wellbeing","Career","Decisions"],note:"Map satisfaction across life domains",desc:"A visual circle divided into life areas. The client scores each area, revealing where energy is high or low and where coaching focus belongs."},
  {name:"Zurich Resource Model",category:"Method",practiced:true,topics:["Stuck","Identity","Wellbeing"],note:"Activates existing resources",desc:"Guides the client to identify and reconnect with inner resources — strengths, past successes, values — that already exist but feel inaccessible in the current stuck state."},
  {name:"Inner Team",category:"Method",practiced:true,topics:["Identity","Conflict","Decisions"],note:"Gives voice to inner parts",desc:"Models the psyche as a team of inner figures. Each part gets a voice, revealing the internal conflict behind the client's ambivalence."},
  {name:"Role Analysis",category:"Method",practiced:false,topics:["Career","Identity","Teams"],note:"Clarifies role expectations and gaps",desc:"Maps the gap between what a role formally requires and what the client actually does. Useful when a client feels overwhelmed, underused, or in conflict with their professional environment."},
  {name:"Role Expectations Scaling Analysis",category:"Method",practiced:false,topics:["Career","Identity","Teams"],note:"Scales and prioritizes expectations across stakeholders",desc:"A structured analysis that maps expectations from different stakeholders (manager, team, organisation, self) on a scale, revealing where the client is overloaded, misaligned, or working against competing demands."},
  {name:"Role Model Reflection",category:"Method",practiced:false,topics:["Identity","Career"],note:"Extracts implicit values via role models",desc:"The client names 4 to 6 role models, extracts key characteristics from each, and distills their top 6. These become their implicit value system made explicit."},
  {name:"Life Line",category:"Method",practiced:false,topics:["Identity","Change","Career"],note:"Maps key life events on a timeline",desc:"The client draws a timeline marking highs, lows, and turning points. Reveals recurring patterns, resilience themes, and moments that shaped their current identity."},
  {name:"Talent Exercise (Rappe-Giesecke)",category:"Method",practiced:false,topics:["Identity","Career","Wellbeing"],note:"Surfaces unrecognized talents",desc:"A structured reflection that helps the client identify talents they take for granted. Often reveals the gap between self-perception and actual capability."},
  {name:"Position Determination (Rappe-Giesecke)",category:"Method",practiced:false,topics:["Career","Teams","Identity"],note:"Base Triad: person, profession, function",desc:"Examines three dimensions of professional identity: who the person is, what their profession means to them, and what function they perform. Clarifies where tension sits."},
  {name:"Values Hierarchy Work",category:"Method",practiced:false,topics:["Decisions","Identity","Conflict"],note:"Pairwise comparison reveals true priorities",desc:"The client selects values and compares each pair to identify which wins when forced to choose. The resulting hierarchy reveals the implicit priorities that drive real decisions."},
  {name:"Wonder Wheel (Storch)",category:"Method",practiced:false,topics:["Identity","Career","Wellbeing"],note:"Connects values to intrinsic motivation",desc:"Connects a desired goal to the client's core values and somatic felt sense. A goal only generates sustained motivation when rooted in something the client deeply cares about."},
  {name:"Four Perspectives for Conflict",category:"Method",practiced:false,topics:["Conflict","Relationships"],note:"Floor exercise: judgment to needs to empathy",desc:"A physical floor exercise using four markers: outer judgment, self-blame, own needs and feelings, and the other person's needs and feelings. Breaks the judgment-blame cycle."},
  {name:"Meta-Mirror",category:"Method",practiced:false,topics:["Conflict","Relationships","Stuck"],note:"Adds observer meta-position to conflict",desc:"An NLP-based perceptual positions exercise. The client steps into their own perspective, the other person's perspective, and then an observer position. Reveals the pattern from outside the conflict."},
  {name:"Four-Step Model (Radatz)",category:"Method",practiced:false,topics:["Change","Decisions","Stuck"],note:"Four courage quadrants",desc:"Explores four types of courage: to change, to preserve, to combine old and new, and to try something completely new. Powerful when a client is stuck between staying and leaving."},
  {name:"Fear Setting (Ferriss)",category:"Method",practiced:false,topics:["Change","Decisions","Stuck"],note:"Maps worst-case scenarios systematically",desc:"Maps the worst-case scenario in detail, evaluates how likely and survivable it is, and weighs it against the cost of inaction. Turns vague fear into a manageable calculation."},
  {name:"Circle of Influence",category:"Method",practiced:false,topics:["Stuck","Career","Change"],note:"Separates what you can control from what you cannot",desc:"Distinguishes between the circle of concern (everything that worries the client) and the circle of influence (where they can actually act). Redirects energy toward what is actionable."},
  {name:"Role Compass",category:"Method",practiced:false,topics:["Career","Identity","Change"],note:"Maps expected vs actual vs desired vs capable",desc:"Maps the client's current role across four directions: what they are expected to do, what they actually do, what they want to do, and what they are capable of. The gaps are the coaching material."},
  {name:"Constellations with Figures",category:"Method",practiced:true,topics:["Relationships","Conflict","Teams"],note:"Spatial mapping of people, roles, and forces",desc:"Uses physical figures or objects to represent people, roles, or forces in the client's system. The client arranges them spatially and explores the dynamics between them. Surfaces patterns that words alone do not reach."},
  {name:"Leadership Maps",category:"Method",practiced:false,topics:["Career","Teams","Identity"],note:"Maps stakeholders, power dynamics, and alliances",desc:"A visual method for mapping the client's leadership landscape: key stakeholders, power dynamics, alliances and resistances, and where the client sits in the system."},
  {name:"Sweet Spot Analysis",category:"Method",practiced:false,topics:["Career","Identity","Decisions"],note:"Intersection of skill, passion, and value",desc:"Identifies the intersection of what the client is good at, what they love doing, and what the world needs or will pay for. The overlap is the direction for sustainable motivated work."},
  {name:"Pattern Analysis",category:"Method",practiced:false,topics:["Stuck","Identity","Relationships"],note:"Names and explores recurring patterns",desc:"The coach and client identify a recurring pattern in behavior, relationships, or decisions. The pattern is named, its origin explored, and its function examined. Awareness is the first step to change."},
  {name:"Exploration of Different Perspectives",category:"Method",practiced:false,topics:["Conflict","Stuck","Relationships"],note:"Systematically examines a situation through multiple lenses",desc:"Examines a situation through the client's view, other stakeholders' views, a neutral observer's view, and a future self's view. Breaks fixed perspective and opens new options."},
  {name:"Business as Entity Visualisation",category:"Method",practiced:false,topics:["Career","Teams","Change"],note:"Treats the business as a separate living entity",desc:"The client takes a perspective outside themselves to see their business as something separate they are in relationship with, not just an extension of themselves. Opens systemic and strategic insight."},
  {name:"Expectation Carousel",category:"Method",practiced:false,topics:["Teams","Relationships"],note:"Surfaces expectations in groups visually",desc:"A group exercise where participants rotate around stations writing their expectations, concerns, and hopes. Surfaces hidden assumptions and misalignments before a workshop or team process begins."},
  {name:"Associative Writing",category:"Method",practiced:false,topics:["Stuck","Identity","Wellbeing"],note:"Sentence stems that bypass the analytical mind",desc:"The client completes sentence stems in writing for two minutes each without editing or judging. Moves from present observation to past learning to future imagination. Closes with a meta discussion."},
  {name:"Solution-Focused Approach (Meier/Szabo)",category:"Method",practiced:true,topics:["Stuck","Change","Decisions"],note:"Build on exceptions, not problems",desc:"Focuses on exceptions (when is the problem not happening?), small steps forward, and what is already working, rather than analyzing the problem in depth."},
  {name:"Problem-Oriented Approach (Fisch)",category:"Method",practiced:false,topics:["Stuck","Conflict","Change"],note:"Explores the function of the problem",desc:"Examines not just the problem but what function it serves in the client's system, and what attempts to solve it have paradoxically maintained it."},
  {name:"Motivational Interviewing (Miller & Rollnick)",category:"Method",practiced:false,topics:["Change","Stuck","Conflict"],note:"Evokes the client's own motivation for change",desc:"A conversation style that evokes the client's own reasons for change rather than persuading them. Particularly effective when the client is ambivalent or resistant."},
  {name:"Growth vs Fixed Mindset (Dweck)",category:"Method",practiced:false,topics:["Stuck","Identity","Change"],note:"Spot fixed mindset language, reframe effort",desc:"Distinguishes between believing ability is fixed versus believing it can grow. Helps coaches hear limiting beliefs in the client's language and reframe effort as the path to mastery."},
  {name:"Iceberg Model",category:"Method",practiced:true,topics:["Stuck","Identity","Conflict"],note:"Visible behavior driven by invisible beliefs",desc:"Distinguishes visible behaviors from the invisible beliefs, values, and identity that drive them. Used to explore why insight alone does not produce change."},
  {name:"House of Change (Janssen)",category:"Method",practiced:false,topics:["Change","Teams"],note:"Diagnose which room the client is in",desc:"A four-room model (Contentment, Denial, Confusion, Renewal) that maps the emotional stages of change. Identifies where the client or team is stuck and what kind of support is needed."},

function setStatus(val, btn) {
  currentStatus = val;
  document.querySelectorAll(".toggle-btn").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  if (currentArc) { currentArc = null; document.querySelectorAll(".arc-btn").forEach(b => b.classList.remove("active")); }
  render();
}

function setTopic(val) {
  currentTopic = val;
  currentArc   = null;
  currentCat   = null;
  document.querySelectorAll(".arc-btn").forEach(b => b.classList.remove("active"));
  document.querySelectorAll(".cat-btn").forEach(b => b.classList.remove("active"));
  document.querySelectorAll(".sit-btn").forEach(b => b.classList.toggle("active", b.dataset.sit === val));
  render();
}

function setCat(val, btn) {
  if (currentCat === val) {
    currentCat = null;
    btn.classList.remove("active");
  } else {
    currentCat = val;
    document.querySelectorAll(".cat-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    currentArc   = null;
    currentTopic = "All";
    document.querySelectorAll(".arc-btn").forEach(b => b.classList.remove("active"));
    document.querySelectorAll(".sit-btn").forEach(b => b.classList.remove("active"));
    document.querySelector(".sit-btn[data-sit='All']").classList.add("active");
  }
  render();
}

function setArc(val, btn) {
  if (currentArc === val) { currentArc = null; btn.classList.remove("active"); render(); return; }
  currentArc   = val;
  currentCat   = null;
  currentTopic = "All";
  document.querySelectorAll(".arc-btn").forEach(b => b.classList.remove("active"));
  document.querySelectorAll(".cat-btn").forEach(b => b.classList.remove("active"));
  document.querySelectorAll(".sit-btn").forEach(b => b.classList.remove("active"));
  document.querySelector(".sit-btn[data-sit='All']").classList.add("active");
  btn.classList.add("active");
  renderArc(val);
}

function renderArc(type) {
  document.getElementById("main-view").style.display = "none";
  document.getElementById("arc-view").style.display = "block";
  const arc = coachingArcs[type];
  document.getElementById("stats").innerHTML = `<span>${arc.meta.h1.replace(/&amp;/g,'&')} ${arc.meta.em} Guide</span>`;
  // nav-count removed
  document.getElementById("arc-view").innerHTML = `
    <div class="arc-hero">
      <h2>${arc.meta.h1}<br><em>${arc.meta.em}</em></h2>
      <p>${arc.meta.sub}</p>
    </div>
    <div class="arc-content">
      ${arc.phases.map((p,i)=>`
        <div class="arc-phase-block">
          <div class="arc-phase-header">
            <div class="phase-num">0${i+1}</div>
            <div class="phase-label">${p.phase}</div>
            <div class="phase-line"></div>
          </div>
          <div class="arc-grid">
            ${p.items.map(item=>{
              const m = methods.find(m=>m.name===item.name);
              const pr = m ? m.practiced : false;
              const desc = m ? m.desc : '';
              return `<div class="arc-card${pr?'':' learning'}">
                <div class="arc-card-top"><h3>${item.name}</h3><span class="card-badge">◎</span></div>
                <div class="arc-when">${item.when}</div>
                <div class="arc-note">${item.note}</div>
                ${desc?`<div class="arc-desc">${desc}</div>`:''}
              </div>`;
            }).join('')}
          </div>
        </div>
      `).join('')}
    </div>`;
}

function renderTopicArc(topic) {
  document.getElementById("main-view").style.display = "none";
  document.getElementById("arc-view").style.display = "block";
  const sections = topicArcs[topic];
  const allMethodsInTopic = methods.filter(m => m.topics.includes(topic));
  const pCount = allMethodsInTopic.filter(m=>m.practiced).length;
  const lCount = allMethodsInTopic.filter(m=>!m.practiced).length;
  document.getElementById("stats").innerHTML = `<span>${topic}: ${allMethodsInTopic.length} methods</span><span class="divider"></span><span class="stat-practiced">✓ ${pCount} practiced</span><span class="divider"></span><span class="stat-practiced" style="color:var(--sage)">◎ ${lCount} to learn</span>`;
  // nav-count removed

  const sectionKeys = sectionLabels.filter(s => sections[s] && sections[s].length > 0);

  document.getElementById("arc-view").innerHTML = `
    <div class="arc-hero">
      <h2>${topic}<br><em>Guide</em></h2>
      <p>Methods organized by coaching approach for ${topic.toLowerCase()} topics</p>
    </div>
    <div class="arc-content">
      ${sectionKeys.map((s,i)=>`
        <div class="arc-phase-block">
          <div class="arc-phase-header">
            <div class="phase-num">0${i+1}</div>
            <div class="phase-label">${s}</div>
            <div class="phase-line"></div>
          </div>
          <div class="arc-grid">
            ${sections[s].map(item=>{
              const m = methods.find(m=>m.name===item.name);
              const pr = m ? m.practiced : false;
              const desc = m ? m.desc : '';
              return `<div class="arc-card${pr?'':' learning'}">
                <div class="arc-card-top"><h3>${item.name}</h3><span class="card-badge">◎</span></div>
                <div class="arc-when">${item.when}</div>
                <div class="arc-note">${item.note}</div>
                ${desc?`<div class="arc-desc">${desc}</div>`:''}
              </div>`;
            }).join('')}
          </div>
        </div>
      `).join('')}
    </div>`;
}

function render() {
  if (currentArc) { renderArc(currentArc); return; }
  if (currentTopic !== "All" && topicArcs[currentTopic]) { renderTopicArc(currentTopic); return; }

  document.getElementById("main-view").style.display = "block";
  document.getElementById("arc-view").style.display = "none";

  const search = document.getElementById("search").value.toLowerCase();
  const filtered = methods.filter(m => {
    const matchStatus = currentStatus==="all" || (currentStatus==="practiced" && m.practiced) || (currentStatus==="learning" && !m.practiced);
    const matchCat    = !currentCat || m.category === currentCat;
    const matchSearch = !search || m.name.toLowerCase().includes(search) || m.note.toLowerCase().includes(search) || m.desc.toLowerCase().includes(search);
    return matchStatus && matchCat && matchSearch;
  });

  const pCount = filtered.filter(m=>m.practiced).length;
  const lCount = filtered.filter(m=>!m.practiced).length;
  const label  = currentCat ? `${currentCat}: ${filtered.length} methods` : `${filtered.length} methods`;
  document.getElementById("stats").innerHTML = `<span>${label}</span><span class="divider"></span><span class="stat-practiced">✓ ${pCount} practiced</span><span class="divider"></span><span class="stat-practiced" style="color:var(--sage)">◎ ${lCount} to learn</span>`;
  // nav-count removed

  const catOrder = ["Process","Framework","Method","Tools"];
  const grouped = {};
  catOrder.forEach(c => grouped[c] = []);
  filtered.forEach(m => { if (grouped[m.category]) grouped[m.category].push(m); });

  const grid = document.getElementById("grid");
  if (!filtered.length) { grid.innerHTML='<div class="empty">No methods match this filter</div>'; return; }

  grid.innerHTML = catOrder.filter(c=>grouped[c].length>0).map(cat=>`
    <div class="category-section">
      <div class="category-header">
        <div class="cat-dot"></div>
        <span class="cat-label-text">${cat}</span>
        <div class="cat-line"></div>
        <span class="cat-count">${grouped[cat].length}</span>
      </div>
      <div class="cards-grid">
        ${grouped[cat].map(m=>`
          <div class="card ${m.practiced?'':'learning'}">
            <div class="card-top">
              <span class="card-name">${m.name}</span>
              <span class="card-badge">◎</span>
            </div>
            <div class="card-note">${m.note}</div>
            <div class="card-desc">${m.desc}</div>
            <div class="card-tags">${m.topics.slice(0,3).map(t=>`<span class="card-tag">${t}</span>`).join('')}</div>
          </div>
        `).join('')}
      </div>
    </div>
  `).join('');
}

// Build topic filters
const sitFilters = document.getElementById("sit-filters");
topics.forEach(s => {
  const btn = document.createElement("button");
  btn.className = "sit-btn" + (s==="All"?" active":"");
  btn.dataset.sit = s;
  btn.textContent = s;
  btn.onclick = () => setTopic(s);
  sitFilters.appendChild(btn);
});

render();
</script>
</body>
</html>
